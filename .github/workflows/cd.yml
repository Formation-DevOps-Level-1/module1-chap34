name: CD Pipeline
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Build dependencies
        run: |
          chmod +x ./mvnw
          ./mvnw clean install -DskipTests
      
  build-and-push:
    needs: build
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: demo-app
      ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV
      - name: Build docker image
        run: |
          chmod +x ./mvnw
          ./mvnw spring-boot:build-image "-Dspring-boot.build-image.imageName=gildastema/${IMAGE_NAME}:${IMAGE_TAG}"
          ./mvnw spring-boot:build-image "-Dspring-boot.build-image.imageName=gildastema/demo-app:latest"

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - name: Push docker image
        run: |
          docker tag gildastema/${IMAGE_NAME}:${IMAGE_TAG} ${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${IMAGE_TAG}
          docker tag gildastema/${IMAGE_NAME}:latest ${ACR_LOGIN_SERVER}/${IMAGE_NAME}:latest
          docker push ${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${IMAGE_TAG}
          docker push ${ACR_LOGIN_SERVER}/${IMAGE_NAME}:latest